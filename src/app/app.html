<app-toast />
<app-confirm-dialog />

@if (auth.currentUser(); as user) {
  <div class="flex min-h-screen bg-slate-950 text-slate-100 font-sans">
    <!-- Sidebar -->
    <aside class="w-64 border-r border-slate-900 bg-slate-900/40 backdrop-blur-md flex flex-col shrink-0">
      <div class="h-16 flex items-center px-6 border-b border-slate-900">
        <span class="text-xl font-bold bg-linear-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">
          InventorySystem
        </span>
      </div>

      <!-- Navigation Links -->
      <nav class="flex-1 p-4 space-y-1">
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-indigo-950/60 border-indigo-800/80 text-white font-medium"
          class="flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-slate-400 hover:text-white hover:bg-slate-900/50 hover:border-slate-800/50 transition-all duration-200"
        >
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
          </svg>
          {{ i18n.t('Dashboard.Title') }}
        </a>
        <a
          routerLink="/inventory/products"
          routerLinkActive="bg-indigo-950/60 border-indigo-800/80 text-white font-medium"
          class="flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-slate-400 hover:text-white hover:bg-slate-900/50 hover:border-slate-800/50 transition-all duration-200"
        >
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
          </svg>
          {{ i18n.t('Product.Title') }}
        </a>
        <a
          routerLink="/inventory/stock"
          routerLinkActive="bg-indigo-950/60 border-indigo-800/80 text-white font-medium"
          class="flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-slate-400 hover:text-white hover:bg-slate-900/50 hover:border-slate-800/50 transition-all duration-200"
        >
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
          {{ i18n.t('Stock.Movement') }}
        </a>
      </nav>

      <!-- Footer / Language Toggle / Logout -->
      <div class="p-4 border-t border-slate-900 space-y-3">
        <!-- Language Selector -->
        <div class="flex items-center justify-between px-2 text-[10px] font-bold text-slate-500 tracking-wider">
          <span>IDIOMA / LANG</span>
          <div class="flex gap-2 items-center">
            <button
              (click)="i18n.setLanguage('es')"
              [class.text-indigo-400]="i18n.currentLanguage() === 'es'"
              class="hover:text-slate-300 transition-colors"
            >
              ES
            </button>
            <span class="text-slate-800">|</span>
            <button
              (click)="i18n.setLanguage('en')"
              [class.text-indigo-400]="i18n.currentLanguage() === 'en'"
              class="hover:text-slate-300 transition-colors"
            >
              EN
            </button>
          </div>
        </div>

        <!-- User info & Logout -->
        <div class="flex items-center justify-between p-3 rounded-xl bg-slate-900/60 border border-slate-800">
          <div class="overflow-hidden mr-2">
            <p class="text-xs font-semibold text-slate-300 truncate">{{ user.email }}</p>
            <p class="text-[10px] text-slate-500 uppercase tracking-wider font-bold">{{ user.role }}</p>
          </div>
          <button
            (click)="logout()"
            class="p-2 text-slate-400 hover:text-rose-400 hover:bg-rose-950/20 rounded-lg transition-colors cursor-pointer"
            [ariaLabel]="i18n.t('Auth.Logout')"
          >
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col min-w-0">
      <!-- Top header -->
      <header class="h-16 border-b border-slate-900 bg-slate-900/20 backdrop-blur-md flex items-center justify-between px-8 shrink-0">
        <h2 class="text-lg font-semibold text-slate-200">
          {{ i18n.t('Dashboard.Title') }}
        </h2>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-900 border border-slate-800 text-xs">
            <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-slate-400 font-medium">Online</span>
          </div>
        </div>
      </header>

      <!-- Main body -->
      <main class="flex-1 overflow-auto p-8">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
} @else {
  <div class="min-h-dvh bg-slate-950 text-slate-100 flex items-center justify-center font-sans w-full">
    <router-outlet></router-outlet>
  </div>
}
